name: CI/CD — Weather Bot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/polymarket-weather-bot

jobs:
  # ── CI: Test & Build ────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python3 -m py_compile app.py
          python3 -m py_compile config.py
          python3 -m py_compile new_market_monitor.py
          python3 -m py_compile analyzers/volume_analyzer.py
          python3 -m py_compile analyzers/risk_manager.py
          python3 -m py_compile executors/polymarket_trader.py
          python3 -m py_compile notifications/telegram_bot.py
          python3 -m py_compile notifications/telegram_handler.py
          echo "✅ Syntax check passed"

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:latest .
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "✅ Image pushed"

  # ── CD: Deploy via Self-hosted Runner ───────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "🚀 Deploying..."
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          cd ~/Documents/Project/Polymarket
          git pull origin main
          docker pull ${{ env.IMAGE_NAME }}:latest
          docker-compose down weather-bot
          docker-compose up -d weather-bot
          sleep 5
          docker ps | grep weather-bot
          echo "✅ Deploy selesai!"

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            EMOJI="✅"
            MSG="Deploy berhasil!"
          else
            EMOJI="❌"
            MSG="Deploy GAGAL!"
          fi
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} CI/CD Weather Bot%0A${MSG}%0ACommit: ${{ github.sha }}%0ABy: ${{ github.actor }}" \
            -d parse_mode="HTML"